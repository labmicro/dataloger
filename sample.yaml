name: lea
latitude: -26.83421
longitude: -65.204903

mqtt:
  server: raspberry.local
  port: 1883
  tls: false
  username:
  password:

storage:
  dir: ./ftp
  filter: 30
  uid: 1000
  gid: 1000

anayzers:
  - name: DioxidoNitroso
    class: EcoPhysicsNOx
    port: /dev/tty.USB1
    address: 1
    topic: lea/nox
  - name: Ozono
    class: O341M
    port: /dev/tty.USB2
    topic: lea/ozono
  - name: DioxidoAzufre
    class: AF22M
    port: /dev/tty.USB3
    topic: lea/azufre
  - name: MaterialParticulado
    class: GrimmEDM264
    host: 192.168.100.204
    port: 4711
    topic: lea/pm
  - name: EstacionMeteorologica
    class: WeatherUnderground
    port: 4712
    topic: lea/meteo
    station_id: KEALAB
    password: changeme
